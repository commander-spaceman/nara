<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nara'Korrin</title>
  </head>
  <body data-tauri-drag-region>
    <div id="app">
      <div id="debug-panel">
        <div class="debug-section">
          <div class="debug-section-title">status</div>
          <div class="debug-row"><span>health</span><span>ok</span></div>
          <div class="debug-row"><span>state</span><span>active</span></div>
          <div class="debug-row"><span>session</span><span>idle</span></div>
          <div class="debug-row"><span>memory</span><span>0 msgs</span></div>
          <div class="debug-row"><span>fps</span><span>60</span></div>
        </div>
        <div class="debug-section">
          <div class="debug-section-title">model</div>
          <div class="debug-row">
            <span>position</span><span>0.0, -0.3, 0.0</span>
          </div>
          <div class="debug-row">
            <span>rotation</span><span>0&deg;, 0&deg;, 0&deg;</span>
          </div>
          <div class="debug-row"><span>scale</span><span>0.99</span></div>
          <div class="debug-row"><span>animation</span><span>idle</span></div>
          <div class="debug-row"><span>blend</span><span>0.00</span></div>
        </div>
        <div class="debug-section">
          <div class="debug-section-title">audio</div>
          <div class="debug-row"><span>pitch</span><span>+2 st</span></div>
          <div class="debug-row"><span>speed</span><span>0.95x</span></div>
          <div class="debug-row">
            <span>dry / wet</span><span>70% / 20%</span>
          </div>
          <div class="debug-row"><span>fx active</span><span>yes</span></div>
          <div class="debug-row"><span>output</span><span>speakers</span></div>
        </div>
      </div>

      <div id="model-area" data-tauri-drag-region>
        <div id="model-placeholder">
          <div class="placeholder-silhouette"></div>
          <div class="placeholder-label">3D model area</div>
        </div>
      </div>

      <div id="subtitle-box">
        <div id="subtitle-text">subtitles appear here</div>
      </div>

      <div id="controls">
        <div class="ctrl-group">
          <button id="btn-mic" class="ctrl-btn" title="Voice input">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-4 7v3h-2v-3h2z"
                fill="currentColor"
              />
            </svg>
          </button>
          <span class="ctrl-label">mic</span>
        </div>
        <div class="ctrl-group">
          <button id="btn-chat" class="ctrl-btn" title="Text input">
            <svg viewBox="0 0 24 24">
              <path
                d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"
                fill="currentColor"
              />
            </svg>
          </button>
          <span class="ctrl-label">chat</span>
        </div>
      </div>

      <div id="input-container">
        <div id="chat-input-area" class="input-mode">
          <input
            type="text"
            id="chat-input"
            placeholder="type a message..."
            autocomplete="off"
          />
        </div>
        <div id="mic-status-area" class="input-mode hidden">
          <div class="recording-indicator"></div>
          <span>recording...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
